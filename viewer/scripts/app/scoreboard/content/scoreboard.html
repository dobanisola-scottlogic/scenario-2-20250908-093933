<div class="scoreboard">
    <div class="game-info" ng-show="controller.sharedPropertiesService.getSelectedGame()">
        <span class="map">Map <span class="badge">{{controller.getMapName()}}</span></span>
        <span class="teams">
            <span class="label" ng-repeat-start="team in controller.getTeams()" ng-style="controller.getColour(team.colour.HEX)">{{team.teamName.replace(controller.milestoneBotPrefix, '')}}</span>
            <span ng-repeat-end>{{$last ? '' : ' vs '}}</span>
        </span>
        <span class="pull-right"><span class="badge">{{controller.getGameTime() | date : 'MMM d, y h:mm:ss'}}</span></span>
    </div>
    <hr></hr>
</div>
